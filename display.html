<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Antrian - Aulia Apotek & Klinik</title>
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at 15% 15%, rgba(14,165,233,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(56,189,248,0.08), transparent 40%),
      linear-gradient(160deg, #060b18 0%, #0a1128 45%, #0d1233 100%);
    color: #f1f5f9;
    overflow: hidden;
  }
  .wrap { height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }

  /* ---------- Header ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 48px; background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .brand { display: flex; align-items: center; gap: 18px; }
  .brand img { width: 54px; height: 54px; border-radius: 14px; background: #fff; padding: 5px; box-shadow: 0 4px 18px rgba(0,0,0,0.35); }
  .brand h1 { font-size: 21px; font-weight: 800; letter-spacing: 0.2px; }
  .brand p { font-size: 12.5px; color: #7dd3fc; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

  .head-right { display: flex; align-items: center; gap: 26px; }
  .live { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: #4ade80; text-transform: uppercase; }
  .live .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 0 rgba(74,222,128,0.6); animation: pulseDot 1.8s infinite; }
  @keyframes pulseDot { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.55); } 70% { box-shadow: 0 0 0 9px rgba(74,222,128,0); } 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); } }
  .live.off .dot { background: #f87171; animation: none; }
  .live.off { color: #f87171; }

  #clock { text-align: right; }
  #jam { font-size: 25px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
  #tanggal { font-size: 12.5px; color: #94a3b8; margin-top: 2px; text-transform: capitalize; }

  /* ---------- Main: two panels ---------- */
  main {
    display: grid; grid-template-columns: 1.55fr 1fr; gap: 28px;
    padding: 34px 48px; min-height: 0;
  }
  .panel {
    border-radius: 26px; padding: 34px 40px; display: flex; flex-direction: column;
    position: relative; overflow: hidden; min-height: 0;
  }
  .panel-current {
    background: linear-gradient(155deg, rgba(14,116,144,0.22), rgba(15,23,42,0.55));
    border: 1px solid rgba(56,189,248,0.28);
    box-shadow: 0 30px 70px -25px rgba(14,165,233,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
    align-items: center; justify-content: center; text-align: center;
  }
  .panel-current::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(56,189,248,0.16), transparent 60%);
    pointer-events: none;
  }
  .panel-next {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.08);
    align-items: center; justify-content: center; text-align: center;
  }

  .tag {
    font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    padding: 7px 18px; border-radius: 999px; margin-bottom: 22px;
  }
  .tag-current { background: rgba(56,189,248,0.16); color: #7dd3fc; border: 1px solid rgba(125,211,252,0.35); }
  .tag-next { background: rgba(148,163,184,0.14); color: #cbd5e1; border: 1px solid rgba(203,213,225,0.2); }

  #nomorCurrent {
    font-size: min(17vw, 200px); font-weight: 900; line-height: 0.95; letter-spacing: -2px;
    background: linear-gradient(180deg, #ffffff 0%, #bae6fd 55%, #38bdf8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 10px 50px rgba(56,189,248,0.25);
    position: relative; z-index: 1;
  }
  #namaCurrent { font-size: 34px; font-weight: 700; margin-top: 14px; position: relative; z-index: 1; }
  #dokterCurrent {
    font-size: 18px; font-weight: 600; color: #7dd3fc; margin-top: 10px;
    display: inline-flex; align-items: center; gap: 8px; position: relative; z-index: 1;
  }
  #dokterCurrent svg { width: 18px; height: 18px; }
  .empty-current { font-size: 22px; color: rgba(241,245,249,0.35); font-weight: 500; }

  #nomorNext {
    font-size: min(9vw, 108px); font-weight: 800; line-height: 1;
    color: #e2e8f0;
  }
  #dokterNext {
    font-size: 16px; font-weight: 600; color: #94a3b8; margin-top: 14px;
    display: inline-flex; align-items: center; gap: 7px;
  }
  #dokterNext svg { width: 15px; height: 15px; }
  .empty-next { font-size: 17px; color: rgba(241,245,249,0.3); font-weight: 500; }

  @keyframes popIn {
    0% { transform: scale(0.82); opacity: 0; }
    55% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .flash-in { animation: popIn 0.55s cubic-bezier(0.2,0.8,0.2,1); }

  @keyframes ringPulse {
    0% { box-shadow: 0 30px 70px -25px rgba(14,165,233,0.35), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 0 rgba(56,189,248,0.5); }
    50% { box-shadow: 0 30px 70px -25px rgba(14,165,233,0.55), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 14px rgba(56,189,248,0); }
    100% { box-shadow: 0 30px 70px -25px rgba(14,165,233,0.35), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 0 rgba(56,189,248,0); }
  }
  .panel-current.ring-flash { animation: ringPulse 1.4s ease-out; }

  /* ---------- Footer: history strip ---------- */
  footer {
    background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.07);
    padding: 18px 48px 22px;
  }
  footer .ft-label {
    font-size: 11.5px; letter-spacing: 3px; text-transform: uppercase; color: #64748b;
    margin-bottom: 12px; font-weight: 700;
  }
  .riwayat { display: flex; gap: 14px; flex-wrap: wrap; }
  .riwayat .item {
    background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 12px 20px; min-width: 130px;
  }
  .riwayat .item .no { font-size: 21px; font-weight: 800; color: #94a3b8; letter-spacing: -0.5px; }
  .riwayat .item .nm { font-size: 12.5px; color: #64748b; margin-top: 3px; font-weight: 500; }
  .riwayat .empty { font-size: 13px; color: #475569; padding: 10px 0; }

  #soundBtn {
    position: fixed; top: 22px; right: 48px; z-index: 20;
    background: rgba(56,189,248,0.14); border: 1px solid rgba(125,211,252,0.4);
    color: #7dd3fc; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; display: none; letter-spacing: 0.3px;
  }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <button id="soundBtn" onclick="aktifkanSuara()">🔊 Aktifkan Suara</button>

  <header>
    <div class="brand">
      <img src="logostruk.png" alt="Aulia" onerror="this.style.display='none'">
      <div>
        <h1>Aulia Apotek &amp; Klinik</h1>
        <p>Display Panggilan Antrian</p>
      </div>
    </div>
    <div class="head-right">
      <div class="live" id="liveStatus"><span class="dot"></span>Live</div>
      <div id="clock">
        <div id="jam">--:--:--</div>
        <div id="tanggal">-</div>
      </div>
    </div>
  </header>

  <main>
    <section class="panel panel-current" id="panelCurrent">
      <span class="tag tag-current">Sedang Dilayani</span>
      <div id="areaCurrent">
        <div class="empty-current">Menunggu panggilan pertama…</div>
      </div>
    </section>

    <section class="panel panel-next" id="panelNext">
      <span class="tag tag-next">Antrian Berikutnya</span>
      <div id="areaNext">
        <div class="empty-next">Tidak ada antrian menunggu</div>
      </div>
    </section>
  </main>

  <footer>
    <div class="ft-label">Riwayat Panggilan</div>
    <div class="riwayat" id="riwayat"><span class="empty">Belum ada panggilan</span></div>
  </footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// ============================================================
// Halaman ini BERDIRI SENDIRI (bukan bagian dari SPA index.html),
// dibuat untuk dibuka di TV / monitor ruang tunggu tanpa perlu login.
// Membaca dokumen 'pengaturan/antrianDisplay' secara real-time:
//   - field 'current' & 'riwayat' ditulis oleh js/klinik/antrian.js
//     saat tombol "Panggil"/"Panggil Ulang" dipakai.
//   - field 'next' ditulis oleh js/klinik/antrian.js (syncNextWaiting)
//     setiap kali daftar antrian dimuat ulang, berisi nomor pasien
//     menunggu paling depan (TANPA nama, demi privasi pasien yang
//     belum resmi dipanggil).
// Firestore Rules mengizinkan READ PUBLIK khusus dokumen ini.
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDXuiTRwHttekv5iy6rk8RJA_pVL25v-U4",
  authDomain: "klinikapotekaulia-61641.firebaseapp.com",
  projectId: "klinikapotekaulia-61641",
  storageBucket: "klinikapotekaulia-61641.firebasestorage.app",
  messagingSenderId: "857781555251",
  appId: "1:857781555251:web:33dbb41f292026f9ef9346"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let lastNomor = null;
const ICON_DOKTER = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 0 0-5 5v2a5 5 0 0 0 10 0V7a5 5 0 0 0-5-5Z"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>';

// ---------- Jam & tanggal ----------
function tickClock() {
  const now = new Date();
  document.getElementById('jam').textContent =
    now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('tanggal').textContent =
    now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
setInterval(tickClock, 1000);
tickClock();

// ---------- Chime (Web Audio API, tanpa file audio eksternal) ----------
function mainkanChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 660].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + i * 0.35);
      gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + i * 0.35 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.35 + 0.6);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.35);
      osc.stop(ctx.currentTime + i * 0.35 + 0.6);
    });
  } catch (e) { /* abaikan kalau browser TV tidak izinkan audio otomatis */ }
}
function aktifkanSuara() {
  document.getElementById('soundBtn').style.display = 'none';
  mainkanChime();
}
function ucapkan(teks) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(teks);
  u.lang = 'id-ID';
  u.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const idVoice = voices.find(v => v.lang.toLowerCase().indexOf('id') !== -1);
  if (idVoice) u.voice = idVoice;
  window.speechSynthesis.speak(u);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ---------- Render: panel "Sedang Dilayani" ----------
function renderCurrent(data, isBaru) {
  const area = document.getElementById('areaCurrent');
  area.innerHTML = `
    <div id="nomorCurrent" class="flash-in">${escapeHtml(String(data.nomorAntrian))}</div>
    <div id="namaCurrent" class="flash-in">${escapeHtml(data.namaPasien || '')}</div>
    <div id="dokterCurrent" class="flash-in">${ICON_DOKTER}${escapeHtml(data.namaDokter || '-')}</div>
  `;
  if (isBaru) {
    const panel = document.getElementById('panelCurrent');
    panel.classList.remove('ring-flash');
    void panel.offsetWidth;
    panel.classList.add('ring-flash');

    mainkanChime();
    const dokterLafal = (data.namaDokter || '').replace(/dr\.\s*/gi, 'Dokter ').trim();
    setTimeout(() => {
      ucapkan(`Nomor antrian ${data.nomorAntrian}, atas nama ${data.namaPasien}, silakan menuju ke ruang ${dokterLafal}`);
    }, 650);
  }
}

// ---------- Render: panel "Antrian Berikutnya" ----------
function renderNext(next) {
  const area = document.getElementById('areaNext');
  if (!next) {
    area.innerHTML = '<div class="empty-next">Tidak ada antrian menunggu</div>';
    return;
  }
  area.innerHTML = `
    <div id="nomorNext">${escapeHtml(String(next.nomorAntrian))}</div>
    <div id="dokterNext">${ICON_DOKTER}${escapeHtml(next.namaDokter || '-')}</div>
  `;
}

// ---------- Render: riwayat panggilan ----------
function renderRiwayat(list) {
  const el = document.getElementById('riwayat');
  if (!list || !list.length) { el.innerHTML = '<span class="empty">Belum ada panggilan</span>'; return; }
  el.innerHTML = list.map(r => `
    <div class="item">
      <div class="no">${escapeHtml(String(r.nomorAntrian))}</div>
      <div class="nm">${escapeHtml(r.namaPasien || '')}</div>
    </div>
  `).join('');
}

// ---------- Listener real-time ----------
db.collection('pengaturan').doc('antrianDisplay').onSnapshot(function(doc) {
  const live = document.getElementById('liveStatus');
  live.classList.remove('off');
  live.innerHTML = '<span class="dot"></span>Live';

  if (!doc.exists) return;
  const data = doc.data();

  if (data.current) {
    const isBaru = data.current.nomorAntrian !== lastNomor;
    lastNomor = data.current.nomorAntrian;
    renderCurrent(data.current, isBaru);
  }
  renderNext(data.next || null);
  renderRiwayat(data.riwayat);
}, function(err) {
  const live = document.getElementById('liveStatus');
  live.classList.add('off');
  live.innerHTML = '<span class="dot"></span>Terputus';
  console.error(err);
});

// Sebagian browser TV/kiosk memblokir audio/TTS otomatis sebelum ada
// interaksi pengguna. Tampilkan tombol manual kalau itu terjadi.
window.addEventListener('load', () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') document.getElementById('soundBtn').style.display = 'block';
  } catch (e) {
    document.getElementById('soundBtn').style.display = 'block';
  }
  if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
});
</script>
</body>
</html>
